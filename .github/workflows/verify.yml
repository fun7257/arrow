name: verify
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Classic Use verification
        run: |
          mkdir -p scratch
          bash scripts/verify_classic_use.sh scratch
      - uses: actions/upload-artifact@v4
        with:
          name: verify-logs
          path: scratch/
